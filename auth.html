<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입 / 로그인 | Be Natural</title>
  <link rel="stylesheet" href="auth.css">
</head>
<body>
  <main class="auth-wrap">
    <section class="auth-card">
      <header class="auth-header">
        <h1>Be Natural 계정</h1>
        <p>회원가입 및 로그인</p>
      </header>

      <div class="tab-row">
        <button id="signupTab" class="tab-btn active" type="button">회원가입</button>
        <button id="loginTab" class="tab-btn" type="button">로그인</button>
      </div>

      <p id="messageBox" class="message"></p>

      <form id="signupForm" class="auth-form">
        <label>이름 *</label>
        <input name="name" type="text" required>

        <label>이메일(아이디) *</label>
        <input name="email" type="email" required>

        <label>비밀번호 *</label>
        <input name="password" type="password" minlength="8" required>
        <small>소문자, 숫자, 특수문자 각각 1개 이상 포함</small>

        <label>연락처 *</label>
        <input name="contact" type="tel" placeholder="010-0000-0000" required>

        <label>주소 *</label>
        <input name="address" type="text" required>

        <label>성별</label>
        <select name="gender">
          <option value="NONE">선택안함</option>
          <option value="FEMALE">여성</option>
          <option value="MALE">남성</option>
          <option value="OTHER">기타</option>
        </select>

        <label>생년월일 *</label>
        <input name="birthDate" type="date" required>

        <label class="check-label">
          <input name="ageConfirmed" type="checkbox" required>
          만 14세 이상입니다(필수)
        </label>

        <button type="submit" class="primary-btn">회원가입</button>
      </form>

      <form id="loginForm" class="auth-form hidden">
        <label>이메일(아이디)</label>
        <input name="email" type="email" required>

        <label>비밀번호</label>
        <input name="password" type="password" required>

        <button type="submit" class="primary-btn">로그인</button>
      </form>

      <div class="auth-footer">
        <a href="index.html">홈으로 돌아가기</a>
      </div>
    </section>
  </main>

  <script src="auth.js"></script>
</body>
</html>
